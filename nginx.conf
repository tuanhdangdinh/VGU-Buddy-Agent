events { worker_connections 1024; }

http {
    upstream agent_backend {
        server agent:8000;
    }

    upstream streamlit_frontend {
        server streamlit:8501;
    }

    server {
        listen 80;

        # API gateway → FastAPI backend (strip /api/ prefix)
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://agent_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
        }

        # Streamlit internal routes (WebSocket for live updates)
        location /_stcore/ {
            proxy_pass http://streamlit_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
        }

        # Streamlit static assets
        location /static/ {
            proxy_pass http://streamlit_frontend;
            proxy_set_header Host $host;
        }

        # All other traffic → Streamlit UI (with WebSocket upgrade)
        location / {
            proxy_pass http://streamlit_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
        }
    }
}
